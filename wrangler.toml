name = "syncresume-api"
main = "cloudflare/worker/index.ts"
compatibility_date = "2026-06-16"
workers_dev = true

[vars]
APP_ORIGIN = "http://localhost:5173"
APP_BASE_URL = "http://localhost:5173"
AUTH_DEV_MODE = "true"
AUTH_EMAIL_FROM = "SyncResume <noreply@syncresume.io>"
OPENAI_MODEL = "gpt-5.4-mini"

[[d1_databases]]
binding = "DB"
database_name = "syncresume"
database_id = "REPLACE_WITH_D1_DATABASE_ID"
migrations_dir = "cloudflare/migrations"

[[r2_buckets]]
binding = "RESUME_BUCKET"
bucket_name = "syncresume-resumes"
