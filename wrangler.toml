name = "syncresume-api"
main = "cloudflare/worker/index.ts"
compatibility_date = "2026-06-16"
compatibility_flags = ["nodejs_compat"]
workers_dev = false
keep_vars = true
# The production custom domain (`api.syncresume.io`) is managed in the
# Cloudflare Dashboard. Keeping it out of wrangler.toml lets CI deploy code
# without requiring zone-level Workers route permissions.

[vars]
APP_ORIGIN = "https://syncresume.io"
DEFAULT_LLM_PROVIDER = "openai"
OPENAI_MODEL = "gpt-5.4-mini"
# Local Worker development should use `.dev.vars`.
# Set these to your Clerk instance values in the Cloudflare dashboard.
# CLERK_JWKS_URL = "https://<your-clerk-frontend-api>/.well-known/jwks.json"
# CLERK_ISSUER = "https://<your-clerk-issuer>"
# CLERK_AUTHORIZED_PARTIES = "https://syncresume.io"
# Billing uses Stripe through Worker secrets and vars:
# - STRIPE_SECRET_KEY and STRIPE_WEBHOOK_SECRET should be secrets.
# - STRIPE_PRICE_MONTHLY_ID, STRIPE_PRICE_6_MONTH_ID, and STRIPE_PRICE_YEARLY_ID
#   should point to the active SyncResume Pro subscription prices.
# - Optional BILLING_SUCCESS_URL, BILLING_CANCEL_URL, BILLING_PORTAL_RETURN_URL override redirects.

[browser]
binding = "BROWSER"

[[d1_databases]]
binding = "DB"
database_name = "syncresume"
database_id = "46249367-0b1e-4292-9ddb-b80c0c9496cc"
migrations_dir = "cloudflare/migrations"

[[r2_buckets]]
binding = "RESUME_BUCKET"
bucket_name = "syncresume-resumes"
