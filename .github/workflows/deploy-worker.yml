name: Deploy Worker

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/deploy-worker.yml"
      - "cloudflare/**"
      - "package.json"
      - "package-lock.json"
      - "tsconfig.worker.json"
      - "wrangler.toml"
  workflow_dispatch:

concurrency:
  group: deploy-worker-production
  cancel-in-progress: false

jobs:
  deploy:
    name: Apply migrations and deploy Worker
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck Worker
        run: npm run cf:typecheck

      - name: Apply D1 migrations
        run: npm run cf:d1:apply
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      - name: Deploy Worker
        run: npm run cf:deploy
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
